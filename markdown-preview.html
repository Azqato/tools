<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Editor — Azqato's Tools</title>
  <meta name="description" content="Write Markdown and preview the rendered HTML instantly, entirely in your browser." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%235b5bf0'/><text x='50' y='71' font-size='62' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html"><span class="logo">A</span>Azqato's&nbsp;Tools</a>
      <div class="spacer"></div>
      <a class="nav-link hide-sm" href="../index.html#tools">All tools</a>
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <main class="page wrap">
    <div class="page-head">
      <div class="crumb"><a href="index.html">Tools</a> / Markdown Editor</div>
      <h1>Markdown Editor</h1>
      <p>Type Markdown on the left, see it rendered on the right. Nothing is uploaded — it all happens in your browser.</p>
    </div>

    <div class="md-toolbar">
      <div class="grp">
        <button class="md-tool" data-wrap="**" title="Bold">B</button>
        <button class="md-tool" data-wrap="*" title="Italic" style="font-style:italic">I</button>
        <button class="md-tool" data-wrap="`" title="Inline code" style="font-family:var(--mono)">&lt;/&gt;</button>
        <button class="md-tool" data-prefix="# " title="Heading">H</button>
        <button class="md-tool" data-prefix="- " title="List">&bull; List</button>
        <button class="md-tool" data-prefix="> " title="Quote">&ldquo; Quote</button>
        <button class="md-tool" data-link title="Link">Link</button>
      </div>
      <div class="spacer"></div>
      <button class="btn sm" id="btn-sample">Load sample</button>
      <button class="btn sm" id="btn-clear">Clear</button>
      <button class="btn sm" id="btn-copy-html">Copy HTML</button>
      <button class="btn sm primary" id="btn-download">Download .md</button>
    </div>

    <div class="md-split">
      <div class="md-pane">
        <div class="pane-head">
          <span>Markdown</span>
          <span id="md-count">0 chars</span>
        </div>
        <textarea id="md-input" spellcheck="false" placeholder="# Start typing Markdown…"></textarea>
      </div>
      <div class="md-pane">
        <div class="pane-head"><span>Preview</span></div>
        <div class="md-preview"><div class="md-body" id="md-output"></div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">
      <span>© <span class="year"></span> Azqato's Tools</span>
      <div class="spacer"></div>
      <a href="index.html">Home</a>
      <span style="color:var(--text-faint)">Runs 100% in your browser</span>
    </div>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/markdown.js"></script>
  <script>
    var input = document.getElementById("md-input");
    var output = document.getElementById("md-output");
    var count = document.getElementById("md-count");
    var STORE = "azqato-md-draft";

    var SAMPLE = [
      "# Welcome to the Markdown Editor",
      "",
      "This editor renders **Markdown as you type** — and it all runs",
      "*locally* in your browser.",
      "",
      "## Features",
      "",
      "- Headings, **bold**, *italic*, ~~strikethrough~~",
      "- `inline code` and fenced blocks",
      "- [Links](https://example.com) and images",
      "- Task lists:",
      "  - [x] Write Markdown",
      "  - [ ] Profit",
      "",
      "> Blockquotes look like this.",
      "",
      "```js",
      "function hello(name) {",
      "  return `Hi, ${name}!`;",
      "}",
      "```",
      "",
      "| Tool | Runs locally |",
      "| ---- | :----------: |",
      "| Markdown Preview | yes |",
      "| Favicon Downloader | yes |",
      ""
    ].join("\n");

    function render() {
      output.innerHTML = mdToHtml(input.value);
      count.textContent = input.value.length.toLocaleString() + " chars";
      localStorage.setItem(STORE, input.value);
    }

    input.addEventListener("input", render);

    // restore draft or load sample on first visit
    var saved = localStorage.getItem(STORE);
    input.value = saved !== null ? saved : SAMPLE;
    render();

    document.getElementById("btn-sample").onclick = function () { input.value = SAMPLE; render(); };
    document.getElementById("btn-clear").onclick = function () { input.value = ""; render(); input.focus(); };
    document.getElementById("btn-copy-html").onclick = function () {
      copyText(mdToHtml(input.value), "HTML copied to clipboard");
    };
    document.getElementById("btn-download").onclick = function () {
      var blob = new Blob([input.value], { type: "text/markdown" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "document.md";
      a.click();
      URL.revokeObjectURL(a.href);
    };

    // toolbar formatting
    document.querySelectorAll(".md-tool").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var s = input.selectionStart, e = input.selectionEnd;
        var val = input.value, sel = val.slice(s, e);
        var before = val.slice(0, s), after = val.slice(e);
        var newPos = e;
        if (btn.dataset.wrap) {
          var w = btn.dataset.wrap;
          input.value = before + w + (sel || "text") + w + after;
          newPos = s + w.length + (sel || "text").length + w.length;
        } else if (btn.dataset.prefix) {
          var atLineStart = s === 0 || val[s - 1] === "\n";
          var pad = atLineStart ? "" : "\n";
          input.value = before + pad + btn.dataset.prefix + (sel || "") + after;
          newPos = s + pad.length + btn.dataset.prefix.length + sel.length;
        } else if (btn.dataset.hasOwnProperty("link")) {
          var label = sel || "text";
          input.value = before + "[" + label + "](https://)" + after;
          newPos = s + label.length + 3;
        }
        input.focus();
        input.setSelectionRange(newPos, newPos);
        render();
      });
    });

    document.querySelectorAll(".year").forEach(function (el) {
      el.textContent = new Date().getFullYear();
    });
  </script>
</body>
</html>
